<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暨南文创 · 幸运转盘</title>
    <style>
        :root { --primary-color: #008f7a; --accent-color: #e74c3c; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 420px; width: 100%; text-align: center; background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .status-bar { margin-bottom: 15px; font-weight: bold; font-size: 1.1em; color: #555; }
        #chance-count { color: var(--accent-color); font-size: 1.2em; margin: 0 5px; }
        
        /* 转盘样式 */
        .wheel-wrapper { position: relative; width: 340px; height: 340px; margin: 25px auto; }
        #canvas { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0, 1); transform: rotate(-90deg); }
        .pointer-box { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); z-index: 100; width: 46px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        
        /* 按钮 */
        .spin-btn { background: linear-gradient(135deg, #00c9a7, var(--primary-color)); color: white; border: none; padding: 16px 60px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 20px rgba(0, 143, 122, 0.3); width: 100%; }
        .spin-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        /* 二抽解锁区 */
        #unlock-area { margin-top: 20px; display: none; padding: 10px; border-top: 1px dashed #ddd; }
        .unlock-link { color: var(--primary-color); font-size: 14px; font-weight: bold; text-decoration: underline; cursor: pointer; }

        /* 奖品明细展示 */
        .prize-list { text-align: left; margin-top: 25px; padding: 15px; background: #fcfcfc; border-radius: 12px; border: 1px solid #eee; font-size: 12px; line-height: 1.6; }
        .prize-item b { display: inline-block; width: 45px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary-color); margin-top: 0;">暨南文创 · 幸运转盘</h2>
    <div class="status-bar">🎁 剩余抽奖次数：<span id="chance-count">1</span></div>

    <div class="wheel-wrapper">
        <div class="pointer-box">
            <svg viewBox="0 0 40 50" width="46" height="56"><path d="M0 0 L40 0 L20 45 Z" fill="#e74c3c"/><circle cx="20" cy="5" r="4" fill="#fff"/></svg>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="handleSpin()">开始抽奖</button>

    <div id="unlock-area">
        <span class="unlock-link" onclick="activateSecondChance()">点赞达标？输入兑换码激活二抽</span>
    </div>

    <div class="prize-list">
        <div style="color:#ee5253"><b>特等奖</b> 暨南文创</div>
        <div style="color:#f39c12"><b>一等奖</b> 电脑包、雨伞</div>
        <div style="color:#82cc17"><b>二等奖</b> 鼠标垫、小风扇、笔袋</div>
        <div style="color:#1abc9c"><b>三等奖</b> 束口袋、运动毛巾、签字笔、文韵续赏礼包</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-btn');
    const chanceDisplay = document.getElementById('chance-count');
    const unlockArea = document.getElementById('unlock-area');

    // 🚀 请务必确认此网址与你 Cloudflare Worker 的路由一致
    const BACKEND_URL = 'https://jn-lottery-backend.3038156424.workers.dev'; 

    const prizeConfig = [
        { name: "特等奖", color: "#ee5253", startDeg: 0,   endDeg: 10 },
        { name: "一等奖", color: "#f39c12", startDeg: 10,  endDeg: 65 },
        { name: "二等奖", color: "#aadd44", startDeg: 65,  endDeg: 180 },
        { name: "三等奖", color: "#1abc9c", startDeg: 180, endDeg: 360 }
    ];

    let currentRotation = 0;
    // 状态管理
    let firstDone = localStorage.getItem('jnu_first_done') === 'true';
    let secondActive = localStorage.getItem('jnu_second_active') === 'true';
    let allDone = localStorage.getItem('jnu_all_done') === 'true';

    // 初始化页面状态
    function init() {
        if (allDone) {
            btn.disabled = true;
            btn.innerText = "已参加活动";
            chanceDisplay.innerText = "0";
            unlockArea.style.display = 'none';
        } else if (firstDone && !secondActive) {
            btn.disabled = true;
            btn.innerText = "次数已用完";
            chanceDisplay.innerText = "0";
            unlockArea.style.display = 'block'; // 显示激活链接
        } else if (firstDone && secondActive) {
            btn.disabled = false;
            btn.innerText = "第二次抽奖";
            chanceDisplay.innerText = "1";
            unlockArea.style.display = 'none';
        }
    }

    // 激活二抽逻辑
    function activateSecondChance() {
        const code = prompt("请输入点赞平台发放的兑换码：");
        // 你可以把这里的 "JNU888" 改成你在天天评选设置的那个码
        if (code === "JNU888") { 
            localStorage.setItem('jnu_second_active', 'true');
            alert("解锁成功！获得第二次抽奖机会。");
            location.reload();
        } else {
            alert("兑换码无效，请确认点赞是否达标。");
        }
    }

    async function handleSpin() {
        btn.disabled = true;
        btn.innerText = "正在请求奖池...";

        try {
            const response = await fetch(BACKEND_URL, { method: 'POST' });
            const data = await response.json();

            if (data.error) {
                alert("奖品已全部发完，下次早点来哦！");
                return;
            }

            // 抽奖逻辑更新
            if (secondActive) {
                localStorage.setItem('jnu_all_done', 'true');
            } else {
                localStorage.setItem('jnu_first_done', 'true');
            }

            chanceDisplay.innerText = "0";
            const prize = prizeConfig.find(p => p.name === data.prize);
            const midDeg = (prize.startDeg + prize.endDeg) / 2;
            const targetCssDeg = (360 - midDeg) - 90;
            const finalRotation = currentRotation + 3600 + targetCssDeg;
            currentRotation = finalRotation;
            canvas.style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                alert(`🎉 恭喜！你抽中了【${data.prize}】\n请凭截图去兑奖处领取。`);
                btn.innerText = "抽奖完成";
                if (!secondActive) unlockArea.style.display = 'block';
            }, 6500);

        } catch (e) {
            alert("网络繁忙，请稍后再试");
            btn.disabled = false;
            btn.innerText = "重试";
        }
    }

    function draw() {
        ctx.textAlign = "center"; ctx.font = "bold 17px sans-serif";
        prizeConfig.forEach(p => {
            const s = (p.startDeg * Math.PI)/180, e = (p.endDeg * Math.PI)/180;
            ctx.beginPath(); ctx.fillStyle = p.color; ctx.moveTo(200, 200); ctx.arc(200, 200, 200, s, e); ctx.fill();
            ctx.save(); ctx.fillStyle = "#fff"; ctx.translate(200, 200); ctx.rotate((s+e)/2); ctx.fillText(p.name, 130, 8); ctx.restore();
        });
    }

    draw();
    init();
</script>
</body>
</html>
