<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暨南文创 · 幸运转盘</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; padding: 20px; }
        .container { max-width: 420px; width: 100%; text-align: center; background: white; padding: 30px; border-radius: 28px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        
        .wheel-wrapper { position: relative; width: 360px; height: 360px; margin: 40px auto; }
        
        /* 关键修改：Canvas 初始状态 */
        #canvas { 
            width: 100%; height: 100%; 
            transition: transform 6.5s cubic-bezier(0.1, 0, 0, 1); 
            transform: rotate(-90deg); /* 让特等奖初始对准正上方 */
        }

        /* 关键修改：指针向下指 */
        .pointer-box {
            position: absolute;
            top: -35px; /* 悬浮在转盘上方 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 50px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }
        
        .spin-btn { 
            background: linear-gradient(135deg, #00c9a7, #008f7a); color: white; border: none; 
            padding: 16px 60px; font-size: 22px; font-weight: bold; border-radius: 60px; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0, 143, 122, 0.3);
        }
        .spin-btn:disabled { background: #dcdcdc; box-shadow: none; }
        
        .info { text-align: left; font-size: 14px; color: #666; margin-top: 25px; background: #f9f9f9; padding: 18px; border-radius: 14px; line-height: 1.8;}
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#008f7a;">暨南文创 · 幸运转盘</h2>
    <p id="chance-text">🎁 剩余抽奖次数：1</p>

    <div class="wheel-wrapper">
        <div class="pointer-box">
            <svg viewBox="0 0 40 50" width="50" height="60">
                <path d="M0 0 L40 0 L20 45 Z" fill="#e74c3c"/> <circle cx="20" cy="5" r="4" fill="#fff"/>
            </svg>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="startSpin()">开始抽奖</button>

    <div class="info">
        <strong>🎁 奖池清单：</strong><br>
        • <b style="color:#e74c3c">特等奖</b>：暨南文创定制品<br>
        • <b style="color:#f39c12">一等奖</b>：电脑包、雨伞<br>
        • <b style="color:#2ecc71">二等奖</b>：鼠标垫、小风扇<br>
        • <b style="color:#1abc9c">三等奖</b>：束口袋、运动毛巾
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-btn');

    // 物理扇区角度定义 (以3点钟为0度)
    const prizes = [
        { name: "特等奖", color: "#ee5253", prob: 0.03, startDeg: 0, endDeg: 10 },
        { name: "一等奖", color: "#f39c12", prob: 0.15, startDeg: 10, endDeg: 65 },
        { name: "二等奖", color: "#aadd44", prob: 0.32, startDeg: 65, endDeg: 180 },
        { name: "三等奖", color: "#1abc9c", prob: 0.50, startDeg: 180, endDeg: 360 }
    ];

    let currentRotation = 0;

    if (localStorage.getItem('jn_v5_spun')) {
        btn.disabled = true;
        btn.innerText = "已参加活动";
    }

    function drawWheel() {
        ctx.textAlign = "center";
        ctx.font = "bold 18px sans-serif";
        prizes.forEach((prize) => {
            const startRad = (prize.startDeg * Math.PI) / 180;
            const endRad = (prize.endDeg * Math.PI) / 180;
            ctx.beginPath();
            ctx.fillStyle = prize.color;
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, startRad, endRad);
            ctx.fill();
            
            ctx.save();
            ctx.fillStyle = "#fff";
            ctx.translate(200, 200);
            ctx.rotate((startRad + endRad) / 2);
            ctx.fillText(prize.name, 130, 8);
            ctx.restore();
        });
    }

    function startSpin() {
        btn.disabled = true;
        const random = Math.random();
        let cum = 0;
        let winIdx = 3;

        for (let i = 0; i < prizes.length; i++) {
            cum += prizes[i].prob;
            if (random <= cum) { winIdx = i; break; }
        }

        const prize = prizes[winIdx];
        const midDeg = (prize.startDeg + prize.endDeg) / 2;
        
        // 核心逻辑：把奖项转到正上方（-90度位置）
        // 旋转角度 = (360 - 目标角度) - 90
        const targetCssDeg = (360 - midDeg) - 90;
        const totalRotation = currentRotation + 2880 + targetCssDeg; 
        
        currentRotation = totalRotation;
        canvas.style.transform = `rotate(${totalRotation}deg)`;

        setTimeout(() => {
            alert(`🎉 恭喜获得：${prizes[winIdx].name}！\n请凭截图兑奖。`);
            localStorage.setItem('jn_v5_spun', 'true');
        }, 6800);
    }

    drawWheel();
</script>
</body>
</html>
