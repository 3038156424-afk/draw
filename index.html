<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暨南文创 · 幸运转盘</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        
        /* 转盘样式 - 核心布局调整 */
        .wheel-wrapper { position: relative; width: 340px; height: 340px; margin: 25px auto; }
        #canvas { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08)); }
        .pointer { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 60px; 
            margin-left: -25px; margin-top: -45px; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.15));
        }
        
        .spin-btn { 
            background: linear-gradient(135deg, #00c9a7, #008f7a); color: white; border: none; 
            padding: 14px 50px; font-size: 20px; font-weight: bold; border-radius: 50px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0, 143, 122, 0.3);
        }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { background: #d1d1d1; box-shadow: none; cursor: not-allowed; }
        
        .info { text-align: left; font-size: 13px; color: #777; margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee;}
        h2 { color: #008f7a; margin-bottom: 0; }
        #chance-text { color: #555; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>暨南文创 · 幸运转盘</h2>
    <p id="chance-text">🎉 必中好礼！剩余次数：1</p>

    <div class="wheel-wrapper">
        <svg class="pointer" viewBox="0 0 40 50">
            <path d="M20 0 L40 40 L20 35 L0 40 Z" fill="#d63031"/>
            <circle cx="20" cy="35" r="5" fill="#fff"/>
        </svg>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="startSpin()">立即抽奖</button>

    <div class="info">
        <strong>🎁 奖池清单（百分百中奖）：</strong>
        <div style="margin-top:8px;">
            • <b style="color:#d63031">特等奖(15份)</b>：暨南文创定制品<br>
            • <b style="color:#ffa502">一等奖(100份)</b>：电脑包、高质感雨伞<br>
            • <b style="color:#78e08f">二等奖(200份)</b>：鼠标垫、便携小风扇<br>
            • <b style="color:#2ecc71">三等奖(300份)</b>：束口袋、运动毛巾、礼包
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-btn');
    const chanceText = document.getElementById('chance-text');

    // 核心数据：完全匹配你提供转盘布局的比例 (基于360度)
    const prizes = [
        { name: "特等奖", color: "#ee5253", prob: 0.03, startDeg: -2.5, endDeg: 2.5 }, // 占很小一条 (5度), 居中对齐初始位置
        { name: "一等奖", color: "#ffa502", prob: 0.15, startDeg: 2.5, endDeg: 57.5 },  // 占中等块 (55度)
        { name: "二等奖", color: "#aadd44", prob: 0.32, startDeg: 57.5, endDeg: 180 },  // 占大块 (122.5度)
        { name: "三等奖", color: "#1abc9c", prob: 0.50, startDeg: 180, endDeg: 357.5 }  // 占最大块 (177.5度)
    ];

    let currentRotation = 0;
    let isSpinning = false;

    // 限制一人一次
    if (localStorage.getItem('jn_v3_spun')) {
        btn.disabled = true;
        btn.innerText = "已领取奖品";
        chanceText.innerText = "您已完成抽奖，请兑换奖品";
    }

    // 绘制符合新布局的转盘
    function drawWheel() {
        ctx.textAlign = "center";
        ctx.font = "bold 16px sans-serif";
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255,255,255,0.3)";

        prizes.forEach((prize, i) => {
            const startRad = (prize.startDeg * Math.PI) / 180;
            const endRad = (prize.endDeg * Math.PI) / 180;
            
            ctx.beginPath();
            ctx.fillStyle = prize.color;
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, startRad, endRad);
            ctx.fill();
            ctx.stroke();
            
            // 绘制文字 (位置微调)
            ctx.save();
            ctx.fillStyle = "#fff";
            ctx.translate(200, 200);
            const midAngleRad = (startRad + endRad) / 2;
            ctx.rotate(midAngleRad);
            ctx.fillText(prize.name, 120, 5);
            ctx.restore();
        });
    }

    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        btn.disabled = true;

        const random = Math.random();
        let cumulativeProb = 0;
        let winIndex = 3; // 默认为三等奖，防止意外

        // 1. 核心概率计算 (基于物理区域大小)
        for (let i = 0; i < prizes.length; i++) {
            cumulativeProb += prizes[i].prob;
            if (random <= cumulativeProb) {
                winIndex = i;
                break;
            }
        }

        const prize = prizes[winIndex];
        // 2. 计算旋转角度 (多转8圈 + 目标奖项的随机偏移量)
        // 目标奖项区域的中间角度
        const midDeg = (prize.startDeg + prize.endDeg) / 2;
        const targetDeg = 360 - midDeg;
        
        // 加上多圈旋转，让指针精准指到该区域
        const totalRotation = currentRotation + 2880 + targetDeg; 
        
        currentRotation = totalRotation;
        canvas.style.transform = `rotate(${totalRotation}deg)`;

        // 3. 结果处理
        setTimeout(() => {
            alert(`🎉 恭喜！你获得了：${prizes[winIndex].name}\n请凭此界面截图到兑奖处领取！`);
            localStorage.setItem('jn_v3_spun', 'true'); // 标记已抽奖
            chanceText.innerText = "抽奖已结束";
            isSpinning = false;
        }, 6500); // 增加旋转时间，显得更刺激
    }

    drawWheel();
</script>

</body>
</html>
