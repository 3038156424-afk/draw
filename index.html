<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暨南文创 · 幸运转盘</title>
    <style>
        :root { --primary-color: #008f7a; --accent-color: #e74c3c; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 420px; width: 100%; text-align: center; background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .status-bar { margin-bottom: 20px; font-weight: bold; font-size: 1.1em; color: #555; }
        #chance-count { color: var(--accent-color); font-size: 1.2em; margin: 0 5px; }
        .wheel-wrapper { position: relative; width: 340px; height: 340px; margin: 30px auto; }
        #canvas { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0, 1); transform: rotate(-90deg); }
        .pointer-box { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); z-index: 100; width: 46px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        .spin-btn { background: linear-gradient(135deg, #00c9a7, var(--primary-color)); color: white; border: none; padding: 16px 60px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(0, 143, 122, 0.3); }
        .spin-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .prize-list { text-align: left; margin-top: 30px; padding: 20px; background: #fcfcfc; border-radius: 15px; border: 1px solid #eee; font-size: 13px; line-height: 1.8; }
        .prize-item b { display: inline-block; width: 55px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary-color); margin-top: 0;">暨南文创 · 幸运转盘</h2>
    <div class="status-bar">
        🎁 剩余抽奖次数：<span id="chance-count">1</span>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer-box">
            <svg viewBox="0 0 40 50" width="46" height="56">
                <path d="M0 0 L40 0 L20 45 Z" fill="#e74c3c"/>
                <circle cx="20" cy="5" r="4" fill="#fff"/>
            </svg>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="handleSpin()">开始抽奖</button>

    <div class="prize-list">
        <div class="prize-item" style="color:#ee5253"><b>特等奖</b> 暨南文创（品类待定）</div>
        <div class="prize-item" style="color:#f39c12"><b>一等奖</b> 电脑包、雨伞</div>
        <div class="prize-item" style="color:#82cc17"><b>二等奖</b> 鼠标垫、小风扇、笔袋</div>
        <div class="prize-item" style="color:#1abc9c"><b>三等奖</b> 束口袋、运动毛巾、签字笔、文韵续赏小礼包</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-btn');
    const chanceDisplay = document.getElementById('chance-count');

    // 🏆 这里填入你的 Cloudflare Worker 网址
    const BACKEND_URL = 'https://jn-lottery-backend.3038156424.workers.dev'; 

    const prizeConfig = [
        { name: "特等奖", color: "#ee5253", startDeg: 0,   endDeg: 10 },
        { name: "一等奖", color: "#f39c12", startDeg: 10,  endDeg: 65 },
        { name: "二等奖", color: "#aadd44", startDeg: 65,  endDeg: 180 },
        { name: "三等奖", color: "#1abc9c", startDeg: 180, endDeg: 360 }
    ];

    let currentRotation = 0;
    let hasPlayed = localStorage.getItem('lottery_done_v8') === 'true';

    if (hasPlayed) {
        btn.disabled = true;
        btn.innerText = "已参加活动";
        chanceDisplay.innerText = "0";
    }

    function draw() {
        ctx.textAlign = "center";
        ctx.font = "bold 17px sans-serif";
        prizeConfig.forEach(p => {
            const s = (p.startDeg * Math.PI) / 180;
            const e = (p.endDeg * Math.PI) / 180;
            ctx.beginPath();
            ctx.fillStyle = p.color;
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, s, e);
            ctx.fill();
            ctx.save();
            ctx.fillStyle = "#fff";
            ctx.translate(200, 200);
            ctx.rotate((s + e) / 2);
            ctx.fillText(p.name, 130, 8);
            ctx.restore();
        });
    }

    // 核心请求函数
    async function handleSpin() {
        if (hasPlayed) return;

        // 1. 立即锁定UI，防止连点
        btn.disabled = true;
        btn.innerText = "抽奖中...";

        try {
            // 2. 向后端请求结果
            const response = await fetch(BACKEND_URL, { method: 'POST' });
            const data = await response.json();

            if (data.error) {
                alert("奖品已领完，谢谢参与！");
                btn.innerText = "已领完";
                return;
            }

            // 3. 标记已抽奖并更新次数
            hasPlayed = true;
            localStorage.setItem('lottery_done_v8', 'true');
            chanceDisplay.innerText = "0";

            // 4. 计算旋转动画
            const winPrize = prizeConfig.find(p => p.name === data.prize);
            const midDeg = (winPrize.startDeg + winPrize.endDeg) / 2;
            const targetCssDeg = (360 - midDeg) - 90;
            
            const finalRotation = currentRotation + 3600 + targetCssDeg;
            currentRotation = finalRotation;
            canvas.style.transform = `rotate(${finalRotation}deg)`;

            // 5. 结果弹窗
            setTimeout(() => {
                alert(`🎉 恭喜！你抽中了【${data.prize}】\n请凭此界面截图去兑奖处领取。`);
                btn.innerText = "已完成抽奖";
            }, 6500);

        } catch (error) {
            console.error(error);
            alert("网络连接失败，请刷新重试");
            btn.disabled = false;
            btn.innerText = "重新抽奖";
        }
    }

    draw();
</script>
</body>
</html>
